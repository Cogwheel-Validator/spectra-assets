name: "Generate Assets"
run-name: "generate-assets"

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
  workflow_dispatch:
    inputs:
      logLevel:
        description: "Log level"
        required: true
        default: "warning"
        type: choice
        options:
          - info
          - warning
          - debug

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build CLI
        run: go build -o spectra-assets .

      - name: Generate assets
        run: ./spectra-assets process

      - name: Open PR with generated assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add assets/
          if git diff --cached --quiet; then
            echo "Assets already up to date — nothing to PR"
            exit 0
          fi

          branch="ci/assets-$(git rev-parse --short HEAD)"
          git checkout -b "$branch"
          git commit -m "ci: regenerate assets"
          git push origin "$branch"

          gh pr create \
            --title "ci: regenerate assets" \
            --body "Automated asset regeneration triggered by changes to \`data/\`. Review the diff and merge when ready." \
            --base main \
            --head "$branch"
